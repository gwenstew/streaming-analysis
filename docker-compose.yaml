version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: streaming_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: streaming_db
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - streaming_net

  scraper:
    build: ./scraper
    container_name: streaming_scraper
    depends_on:
      - postgres
    environment:
      POSTGRES_CONN: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres/streaming_db
      TMDB_API_KEY: ${TMDB_API_KEY}
    networks:
      - streaming_net


volumes:
  pg_data:

networks:
  streaming_net:
